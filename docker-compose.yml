version: '3.9'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - media_data:/app/media   # чтобы картинки не исчезали при рестарте
    restart: always

# Именованные тома - данные сохраняются между перезапусками контейнера
volumes:
  media_data:
